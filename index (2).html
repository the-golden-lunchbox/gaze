<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge | Live Bio-Operational Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-lab: #F8F9FA;
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bos-blue: #3B82F6;
        }
        body { 
            margin: 0; 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--bg-lab); 
            color: #1E293B;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Adaptive HUD Styles */
        .hud-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px;
        }

        /* Matryoshka Animations */
        .blur-fx { transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease; }
        .is-blurred { filter: blur(30px); opacity: 0.05; }
        .not-blurred { filter: blur(0); opacity: 1; }

        /* BOS Meter */
        #bos-anchor {
            width: 120px;
            height: 120px;
            border: 2px dashed #CBD5E1;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #bos-dot {
            width: 12px;
            height: 12px;
            background: var(--bos-blue);
            border-radius: 50%;
            position: absolute;
            transition: all 0.1s ease-out;
            box-shadow: 0 0 15px var(--bos-blue);
        }

        .adaptive-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        #start-screen {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="text-4xl font-black tracking-tighter mb-2">Gaze<span class="text-indigo-600">Bridge</span></h1>
        <p class="text-gray-400 text-[10px] uppercase tracking-[0.4em] mb-12">Bio-Operational Status: Ready</p>
        <button id="init-btn" class="bg-indigo-600 text-white px-10 py-5 rounded-full font-black shadow-xl active:scale-95 transition">
            ACTIVATE NEURAL LOCK
        </button>
    </div>

    <!-- HEADER: STATUS CENTER -->
    <header class="p-6 flex justify-between items-start">
        <div class="hud-glass p-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">GB</div>
                <div>
                    <h2 class="text-xs font-black uppercase tracking-widest">Lab Mode</h2>
                    <div id="debug-info" class="text-[9px] font-mono text-gray-400">GYRO: 0.00</div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2">
            <div id="adaptive-level" class="adaptive-badge bg-orange-100 text-orange-600">Level: Training</div>
            <div class="flex gap-2">
                <div id="db-status" class="hud-glass px-4 py-2 text-[10px] font-bold text-red-500 uppercase">Cloud: Offline</div>
                <div id="status-gyro" class="hud-glass px-4 py-2 text-[10px] font-bold text-gray-400 uppercase">Balance</div>
                <div id="status-touch" class="hud-glass px-4 py-2 text-[10px] font-bold text-gray-400 uppercase">Contact</div>
            </div>
        </div>
    </header>

    <!-- MAIN: THE NEURAL ANCHOR -->
    <main class="flex-grow flex flex-col items-center justify-center relative">
        <!-- BOS Visualizer -->
        <div id="bos-container" class="absolute top-10 flex flex-col items-center opacity-30 transition-opacity duration-500">
            <div id="bos-anchor">
                <div id="bos-dot"></div>
            </div>
            <p class="text-[9px] font-bold uppercase tracking-widest mt-4 text-gray-400">Base of Support</p>
        </div>

        <!-- Matryoshka Area -->
        <div id="scene" class="w-full flex flex-col items-center px-6">
            <div id="lock-prompt" class="text-center">
                <i class="fas fa-crosshairs text-4xl text-gray-200 mb-6"></i>
                <p class="text-[11px] font-bold uppercase tracking-[0.3em] text-gray-400">Align BOS & Maintain Touch</p>
            </div>
        </div>
    </main>

    <!-- FOOTER: CONTROL -->
    <footer class="p-10 flex justify-center">
        <button id="touch-btn" class="w-full max-w-sm h-24 rounded-[30px] bg-slate-900 text-white font-black text-xs uppercase tracking-[0.2em] shadow-2xl active:bg-indigo-600 transition-colors flex flex-col items-center justify-center gap-2">
            <i class="fas fa-fingerprint text-xl"></i>
            <span>Steady Connection</span>
        </button>
    </footer>

    <!-- Firebase System SDK Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment Variables (Automatically parsed inside our Canvas Player)
        const firebaseConfigRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gazebridge';
        const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null;
        let auth = null;
        let currentUser = null;

        if (firebaseConfigRaw) {
            try {
                const firebaseConfig = JSON.parse(firebaseConfigRaw);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (customToken) {
                        await signInWithCustomToken(auth, customToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const statusBadge = document.getElementById('db-status');
                        statusBadge.innerText = "Cloud: Live";
                        statusBadge.classList.remove('text-red-500');
                        statusBadge.classList.add('text-green-500');
                        console.log("🔒 Secured anonymous connection to Sandbox DB. ID:", user.uid);
                    }
                });
            } catch (err) {
                console.error("Firebase setup failed:", err);
            }
        }

        // Global secure telemetry save function
        window.saveSecureTelemetry = async function(successes, threshold, lockWindow, level, decodedWord) {
            if (!db || !currentUser) {
                console.log("Telemetry captured (Local only):", decodedWord);
                return;
            }

            try {
                // Rule 1 Compliance: Strictly write only inside authorized sandbox path
                const telemetryCollection = collection(db, 'artifacts', appId, 'public', 'data', 'telemetry');
                await addDoc(telemetryCollection, {
                    userId: currentUser.uid,
                    successes: successes,
                    stabilityThreshold: parseFloat(threshold),
                    lockWindow: parseInt(lockWindow),
                    level: parseInt(level),
                    word: decodedWord,
                    timestamp: serverTimestamp()
                });
                console.log("🚀 Secure Cloud Telemetry successfully uploaded!");
            } catch (error) {
                console.error("Error writing telemetry document:", error);
            }
        }
    </script>

    <script>
        // CORE SETTINGS (ADAPTIVE)
        let config = {
            threshold: 2.5,        // Current jitter allowed
            lockWindow: 800,      // Required ms of stillness
            successes: 0,
            level: 1
        };

        let state = {
            stable: false,
            touching: false,
            sequenceActive: false,
            seqId: 0
        };

        const words = { shell: "🦒", p1: "gi", p2: "raffe", full: "GIRAFFE" };

        // INITIALIZE SENSORS
        document.getElementById('init-btn').addEventListener('click', async () => {
            document.getElementById('start-screen').style.display = 'none';
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res === 'granted') window.addEventListener('devicemotion', handleMotion);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        });

        // BOS & GYRO LOGIC
        function handleMotion(e) {
            const rot = e.rotationRate;
            if (!rot) return;
            const jitter = Math.sqrt((rot.alpha || 0)**2 + (rot.beta || 0)**2 + (rot.gamma || 0)**2);
            
            // BOS DRIFT (Visualizing Tilt)
            const dot = document.getElementById('bos-dot');
            const x = Math.max(-50, Math.min(50, (e.accelerationIncludingGravity?.x || 0) * 5));
            const y = Math.max(-50, Math.min(50, (e.accelerationIncludingGravity?.y || 0) * 5));
            dot.style.transform = `translate(${-x}px, ${y}px)`;

            document.getElementById('debug-info').innerText = `GYRO: ${jitter.toFixed(2)}`;

            const isStable = jitter < config.threshold;
            if (isStable !== state.stable) {
                state.stable = isStable;
                document.getElementById('status-gyro').style.color = isStable ? '#10B981' : '#94A3B8';
                document.getElementById('bos-container').style.opacity = isStable ? '1' : '0.2';
                checkReadiness();
            }
        }

        // TOUCH LOGIC
        const touchBtn = document.getElementById('touch-btn');
        const setTouch = (val) => {
            state.touching = val;
            touchBtn.classList.toggle('bg-indigo-600', val);
            document.getElementById('status-touch').style.color = val ? '#4F46E5' : '#94A3B8';
            checkReadiness();
        };

        touchBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setTouch(true); });
        touchBtn.addEventListener('touchend', () => setTouch(false));
        touchBtn.addEventListener('mousedown', () => setTouch(true));
        touchBtn.addEventListener('mouseup', () => setTouch(false));

        // SEQUENCE CONTROL
        function checkReadiness() {
            const ready = state.stable && state.touching;
            const prompt = document.getElementById('lock-prompt');
            const scn = document.getElementById('scene');

            if (ready) {
                prompt.style.display = 'none';
                if (!state.sequenceActive) runMatryoshka();
            } else {
                prompt.style.display = 'block';
                state.sequenceActive = false;
                state.seqId++;
                scn.innerHTML = '';
            }
        }

        async function runMatryoshka() {
            state.sequenceActive = true;
            const curId = ++state.seqId;
            const scn = document.getElementById('scene');
            const sleep = ms => new Promise(r => setTimeout(() => { if (state.seqId === curId) r(); }, ms));

            const steps = [
                `<div class="blur-fx is-blurred text-9xl">${words.shell}</div>`,
                `<div class="blur-fx is-blurred text-6xl font-black uppercase text-gray-400">${words.p1}</div>`,
                `<div class="blur-fx is-blurred text-6xl font-black uppercase text-gray-400">${words.p2}</div>`
            ];

            for (let html of steps) {
                if (curId !== state.seqId) return;
                scn.innerHTML = html;
                await sleep(config.lockWindow);
                if (curId !== state.seqId) return;
                scn.firstElementChild.classList.remove('is-blurred');
                if (navigator.vibrate) navigator.vibrate(40);
                await sleep(1500);
            }

            // SUCCESS & CLOUD TELEMETRY EMISSION
            if (curId !== state.seqId) return;
            scn.innerHTML = `<div class="bg-indigo-600 text-white px-10 py-5 rounded-[40px] text-4xl font-black">${words.full}</div>`;
            
            // Increment progress
            config.successes++;
            
            // Fire off live cloud database save immediately!
            if (typeof window.saveSecureTelemetry === 'function') {
                window.saveSecureTelemetry(config.successes, config.threshold, config.lockWindow, config.level, words.full);
            }

            // Adaptive Logic: Tighten requirements on progress
            if (config.successes >= 3) {
                config.level++;
                config.successes = 0;
                config.threshold = Math.max(0.8, config.threshold - 0.4); // Stricter tolerance
                config.lockWindow += 200; // Require longer stillness
                updateAdaptiveUI();
            }
        }

        function updateAdaptiveUI() {
            const badge = document.getElementById('adaptive-level');
            badge.innerText = `Level: ${config.level === 2 ? 'Novice Pilot' : 'Elite Focus'}`;
            badge.className = `adaptive-badge ${config.level > 1 ? 'bg-indigo-100 text-indigo-700' : 'bg-orange-100 text-orange-600'}`;
        }
    </script>
</body>
</html>

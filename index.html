<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge // Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@800&family=JetBrains+Mono:wght@500;800&display=swap');

        :root {
            --m-cell-green: #00ff41;
            --nitro-blue: #00d2ff;
            --thrust-red: #ff3131;
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Lexend', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
        }

        #dashboard-container {
            position: relative;
            width: 80vmin;
            height: 80vmin;
            max-width: 400px;
            max-height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(0, 210, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #progress-ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 12px solid rgba(255, 255, 255, 0.01);
            border-top-color: var(--nitro-blue);
            transform: rotate(-90deg);
            opacity: 0;
            transition: opacity 0.2s;
        }

        #target-word {
            font-size: 10vmin;
            font-weight: 900;
            filter: blur(20px);
            transition: filter 0.3s, transform 0.3s, color 0.4s;
            text-align: center;
            z-index: 10;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* TACTICAL STATES */
        .state-thrusting #dashboard-container { border-color: var(--thrust-red); border-width: 4px; box-shadow: 0 0 50px rgba(255, 49, 49, 0.4); transform: scale(0.95); }
        .state-stabilizing #dashboard-container { border-color: var(--nitro-blue); }
        .state-stabilizing #progress-ring { opacity: 1; }
        .state-locked #dashboard-container { border-color: var(--m-cell-green); border-width: 4px; box-shadow: 0 0 70px rgba(0, 255, 65, 0.5); transform: scale(1.05); }
        .state-locked #target-word { filter: blur(0px); transform: scale(1.1); color: var(--m-cell-green); }

        .glitch-text {
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 2px 0 var(--thrust-red), -2px 0 var(--nitro-blue);
        }
    </style>
</head>
<body class="p-6">

    <!-- STARTUP: The Mission Briefing -->
    <div id="overlay" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
        <div class="border-l-4 border-cyan-400 pl-6 mb-12 text-left">
            <h1 class="text-4xl font-black tracking-tighter mb-2">MISSION: HAIL MARY</h1>
            <p class="text-xs text-cyan-400 uppercase tracking-[0.4em]">Neural Co-Pilot v2.0</p>
        </div>
        <p class="text-sm text-slate-400 mb-12 max-w-xs leading-relaxed italic">
            "Commander Dania, the galaxy is blurred. Use your stillness to lock the signal and save the mission."
        </p>
        <button onclick="requestAccess()" class="bg-cyan-600 hover:bg-cyan-400 text-white px-16 py-6 rounded-full font-black text-lg shadow-2xl active:scale-95 transition-all uppercase tracking-widest">
            Engage Bridge
        </button>
    </div>

    <!-- HUD -->
    <header class="flex justify-between items-start z-50">
        <div class="border-l-2 border-cyan-500 pl-3">
            <h2 class="text-[12px] font-black tracking-widest text-white">ZERO_COMMANDER</h2>
            <p id="status-msg" class="text-[9px] text-cyan-400/80 uppercase font-bold">Uplink: Waiting</p>
        </div>
        <div class="text-right">
            <div id="live-signal" class="font-mono text-[10px] text-cyan-500 opacity-50">SIGNAL: 0.00</div>
            <div class="text-[8px] text-slate-600 uppercase">M-Cell Polling: 100Hz</div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center">
        <div id="dashboard-container">
            <div id="progress-ring"></div>
            <p id="hud-label" class="text-[10px] font-mono text-cyan-400 uppercase tracking-[0.4em] mb-4">Initialize</p>
            <div id="target-word" class="glitch-text">LOCKED</div>
        </div>
    </main>

    <footer class="flex justify-between items-end z-50">
        <div class="max-w-[160px]">
            <p class="text-[10px] text-white/20 uppercase tracking-widest mb-1">Project: GazeBridge</p>
            <p class="text-[8px] font-mono text-cyan-600 uppercase">Inhibition Gate: 800ms</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-cyan-400 uppercase mb-1">Targets Cleared</p>
            <div id="counter" class="text-5xl font-black text-white tracking-tighter leading-none">0/6</div>
        </div>
    </footer>

    <script>
        const CONFIG = {
            WINDOW_MS: 800,
            THRUST_THRESHOLD: 2.5,  // Hand-hold optimized
            STILL_THRESHOLD: 0.45   // Hand-hold optimized
        };

        // Mission Words from Dania's favorite worlds
        const MISSION_WORDS = [
            { word: "ROZ", msg: "Wild Robot detected." },
            { word: "ROCKY", msg: "Alien engineer in range." },
            { word: "PILOT", msg: "Focus the cockpit." },
            { word: "ORBIT", msg: "Trajectory locked." },
            { word: "SOVEREIGN", msg: "Agency established." },
            { word: "WIN", msg: "Mission complete." }
        ];

        let currentIdx = 0;
        let state = "IDLE";
        let lastX = 0, lastY = 0;
        let stillnessStart = null;

        async function requestAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') startMission();
                    else alert("Commander, permission is required for the HUD.");
                } catch (e) { alert("Secure Link (HTTPS) required."); }
            } else {
                startMission();
            }
        }

        function startMission() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status-msg').innerText = "Uplink: Live";
            document.getElementById('target-word').innerText = "READY";
            document.getElementById('counter').innerText = `0/${MISSION_WORDS.length}`;
            window.addEventListener('deviceorientation', handleMotion, true);
            speak("Commander Dania, mission engaged. Execute head thrust to find the first signal.");
        }

        function handleMotion(e) {
            if (state === "LOCKED") return;

            let delta = Math.abs(e.beta - lastX) + Math.abs(e.gamma - lastY);
            document.getElementById('live-signal').innerText = "SIGNAL: " + delta.toFixed(2);
            
            const now = performance.now();
            const body = document.body;
            const ring = document.getElementById('progress-ring');
            const label = document.getElementById('hud-label');

            if (delta > CONFIG.THRUST_THRESHOLD) {
                state = "THRUSTING";
                stillnessStart = null;
                body.className = "p-6 state-thrusting";
                label.innerText = "THRUST DETECTED";
                ring.style.opacity = "0.1";
            } 
            else if (state === "THRUSTING" && delta < CONFIG.STILL_THRESHOLD) {
                state = "STABILIZING";
                stillnessStart = now;
                body.className = "p-6 state-stabilizing";
                label.innerText = "LOCKING...";
            }
            else if (state === "STABILIZING") {
                if (delta < CONFIG.STILL_THRESHOLD) {
                    let elapsed = now - stillnessStart;
                    let progress = Math.min(100, (elapsed / CONFIG.WINDOW_MS) * 100);
                    ring.style.opacity = "1";
                    ring.style.borderTopColor = `rgba(0, 210, 255, ${progress/100})`;

                    if (elapsed >= CONFIG.WINDOW_MS) {
                        triggerUnlock();
                    }
                } else {
                    state = "THRUSTING";
                    stillnessStart = null;
                    label.innerText = "STABILITY LOST";
                }
            }

            lastX = e.beta; lastY = e.gamma;
        }

        function triggerUnlock() {
            state = "LOCKED";
            const target = MISSION_WORDS[currentIdx];
            document.body.className = "p-6 state-locked";
            document.getElementById('hud-label').innerText = "SIGNAL ACQUIRED";
            document.getElementById('target-word').innerText = target.word;
            
            speak(target.word + ". " + target.msg);

            setTimeout(() => {
                if (currentIdx < MISSION_WORDS.length - 1) {
                    currentIdx++;
                    resetHUD();
                } else {
                    finishGame();
                }
            }, 3500);
        }

        function resetHUD() {
            state = "READY";
            document.body.className = "p-6";
            document.getElementById('target-word').innerText = "HOLD";
            document.getElementById('target-word').style.filter = "blur(20px)";
            document.getElementById('hud-label').innerText = "WAITING FOR THRUST";
            document.getElementById('counter').innerText = `${currentIdx}/${MISSION_WORDS.length}`;
            document.getElementById('progress-ring').style.opacity = "0";
        }

        function finishGame() {
            document.getElementById('target-word').innerText = "SUCCESS";
            document.getElementById('hud-label').innerText = "MISSION_COMPLETE";
            document.getElementById('counter').innerText = `${MISSION_WORDS.length}/${MISSION_WORDS.length}`;
            speak("Excellent work, Commander Dania. The galaxy is clear. Bridge status: Elite.");
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 0.9; u.pitch = 0.8; u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>

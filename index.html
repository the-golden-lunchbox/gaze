<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge: Ticker Mode v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
        }

        .ticker-container {
            height: 240px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 1px solid rgba(0, 210, 255, 0.2);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            background: linear-gradient(180deg, rgba(0, 210, 255, 0.03) 0%, rgba(0, 0, 0, 0) 100%);
            position: relative;
        }

        #ticker {
            white-space: nowrap;
            font-size: 5rem;
            font-weight: 900;
            padding-left: 100vw;
            will-change: transform;
            color: #00d2ff;
            text-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
            transition: filter 0.2s ease;
        }

        .focus-gate {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: rgba(255, 0, 85, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
            z-index: 10;
        }

        #debug-panel {
            font-family: monospace;
            font-size: 10px;
            color: rgba(0, 210, 255, 0.5);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 8px;
            pointer-events: none;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- Header -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-[#00d2ff]">GAZEBRIDGE</h1>
            <p class="text-[0.6rem] text-gray-500 uppercase tracking-widest">Mode: Smooth Pursuit</p>
        </div>
        <div id="status" class="px-3 py-1 rounded-full border border-gray-800 text-[10px] font-bold uppercase tracking-widest text-gray-500">
            Awaiting Sensors
        </div>
    </div>

    <!-- Debug Info -->
    <div id="debug-panel" class="mb-4 border border-white/5">
        > SENSORS: <span id="sensor-state">OFFLINE</span><br>
        > STABILITY: <span id="stab-val">0</span>%
    </div>

    <!-- Ticker Section -->
    <div class="flex-grow flex items-center justify-center relative w-full">
        <div class="w-full ticker-container">
            <div class="focus-gate"></div>
            <div id="ticker">
                ДАНИЯ ПЕЧАТАЕТ СВОЙ ПЕРВЫЙ АВТОМОБИЛЬ... МАЙ — МЕСЯЦ ОСВЕДОМЛЕННОСТИ ОБ АПРАКСИИ... МЫ СТРОИМ МОСТ... ТЫ — КОМАНДИР СВОЕГО ВЗГЛЯДА...
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-8 flex flex-col items-center gap-4">
        <div class="w-full h-1 bg-gray-900 rounded-full overflow-hidden">
            <div id="stability-bar" class="h-full bg-[#00d2ff] w-0 transition-all duration-200"></div>
        </div>
        
        <button id="startBtn" class="w-full py-4 bg-white text-black font-black text-sm uppercase tracking-widest rounded-xl shadow-lg active:scale-95 transition-transform">
            Initialize Sensors
        </button>

        <!-- Simulation fallback -->
        <button id="simBtn" class="hidden text-[10px] text-gray-600 uppercase tracking-widest underline">
            Run Simulation Mode
        </button>
    </div>

    <script>
        const ticker = document.getElementById('ticker');
        const stabilityBar = document.getElementById('stability-bar');
        const statusBadge = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const simBtn = document.getElementById('simBtn');
        const sensorState = document.getElementById('sensor-state');
        const stabValDisplay = document.getElementById('stab-val');

        let isRunning = false;
        let isSimulating = false;
        let position = 0;
        let speed = 0;
        const baseSpeed = 3.5;
        let stability = 0;
        let lastRotation = 0;

        function update() {
            if (isRunning) {
                if (stability > 85) {
                    // Стабильное состояние — текст течет
                    position -= baseSpeed;
                    speed = baseSpeed;
                    statusBadge.innerText = "SIGNAL CLEAR";
                    statusBadge.className = "px-3 py-1 rounded-full border border-cyan-500 text-[10px] font-bold text-cyan-400";
                    ticker.style.filter = "blur(0px)";
                } else {
                    // Состояние рывка — замедление и размытие
                    speed *= 0.85;
                    position -= speed;
                    statusBadge.innerText = "SEARCHING...";
                    statusBadge.className = "px-3 py-1 rounded-full border border-pink-500 text-[10px] font-bold text-pink-500";
                    ticker.style.filter = `blur(${Math.max(0, (90 - stability) / 5)}px)`;
                }

                // Loop
                if (Math.abs(position) > ticker.offsetWidth) {
                    position = window.innerWidth;
                }

                ticker.style.transform = `translateX(${position}px)`;
            }
            requestAnimationFrame(update);
        }

        async function init() {
            startBtn.classList.add('hidden');
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startSensors();
                    } else {
                        showSimButton();
                    }
                } catch (err) {
                    showSimButton();
                }
            } else {
                startSensors();
            }

            // Если через 2 секунды данных нет — предлагаем симуляцию
            setTimeout(() => {
                if (stability === 0 && !isSimulating) showSimButton();
            }, 2000);
        }

        function startSensors() {
            isRunning = true;
            sensorState.textContent = "ACTIVE (GYRO)";
            window.addEventListener('deviceorientation', (event) => {
                if (isSimulating) return;
                
                let total = Math.abs(event.beta || 0) + Math.abs(event.gamma || 0);
                let delta = Math.abs(total - lastRotation);
                lastRotation = total;

                // Расчет стабильности (инверсия дельты)
                let currentStab = Math.max(0, 100 - (delta * 30));
                stability = (stability * 0.7) + (currentStab * 0.3);
                
                stabilityBar.style.width = `${stability}%`;
                stabValDisplay.textContent = Math.floor(stability);
            });
            update();
        }

        function showSimButton() {
            simBtn.classList.remove('hidden');
            sensorState.textContent = "BLOCKED BY BROWSER";
        }

        simBtn.addEventListener('click', () => {
            isSimulating = true;
            isRunning = true;
            simBtn.classList.add('hidden');
            sensorState.textContent = "EMULATED";
            
            // Цикл симуляции для демонстрации
            setInterval(() => {
                let isStable = Math.random() > 0.4;
                stability = isStable ? 98 : 20;
                stabilityBar.style.width = `${stability}%`;
                stabValDisplay.textContent = Math.floor(stability);
            }, 2500);
            
            update();
        });

        startBtn.addEventListener('click', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge: Neural Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #020202;
            color: #00d2ff;
            overflow: hidden;
            touch-action: none;
        }

        #target {
            width: 80px;
            height: 80px;
            position: absolute;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s linear, opacity 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            z-index: 5;
            left: 0; top: 0;
        }

        .target-cross {
            width: 40px;
            height: 2px;
            background: #00d2ff;
            position: absolute;
        }
        .target-cross.vert { transform: rotate(90deg); }

        .locked {
            border-color: #ff0055 !important;
            box-shadow: 0 0 40px #ff0055 !important;
            transform: scale(1.2);
        }

        .progress-ring {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        #data-stream {
            font-family: monospace;
            font-size: 10px;
            color: rgba(0, 210, 255, 0.4);
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- HUD Header -->
    <div class="flex justify-between items-start mb-4 z-50">
        <div>
            <div class="text-[0.6rem] opacity-50 uppercase tracking-[0.2em]">Pilot Status</div>
            <div id="pilot-name" class="font-black text-xl">DANI_01</div>
        </div>
        <div class="text-right">
            <div class="text-[0.6rem] opacity-50 uppercase tracking-[0.2em]">Level</div>
            <div id="level-val" class="font-black text-xl italic text-pink-500">CALIBRATING</div>
        </div>
    </div>

    <!-- Data Stream -->
    <div id="data-stream" class="absolute left-4 top-24 w-48 h-48 overflow-hidden"></div>

    <!-- Main Training Field -->
    <div id="field" class="flex-grow relative border border-white/5 rounded-2xl overflow-hidden bg-white/[0.02]">
        <div id="target">
            <div class="target-cross"></div>
            <div class="target-cross vert"></div>
            <svg class="absolute" width="100" height="100" viewBox="0 0 100 100">
                <circle id="timer-ring" class="progress-ring" stroke="#ff0055" stroke-width="4" fill="transparent" r="45" cx="50" cy="50" stroke-dasharray="282.7" stroke-dashoffset="282.7"/>
            </svg>
        </div>
        
        <!-- Grid overlay -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
            <div class="w-full h-[1px] bg-cyan-500"></div>
            <div class="h-full w-[1px] bg-cyan-500"></div>
        </div>
    </div>

    <!-- HUD Footer -->
    <div class="mt-6 flex flex-col gap-4 z-50">
        <div class="flex justify-between items-end">
            <div class="flex-grow mr-4">
                <div class="text-[0.5rem] uppercase mb-1 opacity-50 tracking-widest">Neural Stability Link</div>
                <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden border border-white/5">
                    <div id="stability-fill" class="h-full bg-[#00d2ff] w-0 transition-all duration-200"></div>
                </div>
            </div>
            <div id="score" class="text-3xl font-black italic">0000</div>
        </div>
        
        <button id="initBtn" class="w-full py-4 bg-white text-black font-black text-sm uppercase tracking-[0.4em] rounded-lg shadow-lg active:scale-95 transition-transform">
            Initialize Neural Link
        </button>
    </div>

    <script>
        const target = document.getElementById('target');
        const field = document.getElementById('field');
        const initBtn = document.getElementById('initBtn');
        const stabilityFill = document.getElementById('stability-fill');
        const scoreVal = document.getElementById('score');
        const timerRing = document.getElementById('timer-ring');
        const dataStream = document.getElementById('data-stream');
        const levelVal = document.getElementById('level-val');

        let score = 0;
        let isRunning = false;
        let stability = 0;
        let lockProgress = 0;
        let lastRot = 0;
        
        const lockThreshold = 90; 
        const lockTimeRequired = 1000; 
        let lastUpdateTime = Date.now();

        let targetX = 50;
        let targetY = 50;
        let velX = 1.5;
        let velY = 1.5;

        function updateHUD() {
            const line = document.createElement('div');
            line.className = "mb-1";
            line.textContent = `> STAB: ${stability.toFixed(1)}% | T: ${Date.now().toString().slice(-6)}`;
            dataStream.prepend(line);
            if (dataStream.children.length > 12) dataStream.removeChild(dataStream.lastChild);
        }

        function moveTarget() {
            if (!isRunning) return;

            const now = Date.now();
            const dt = now - lastUpdateTime;
            lastUpdateTime = now;

            if (stability < lockThreshold) {
                // Цель движется (поиск фиксации)
                targetX += velX;
                targetY += velY;
                
                // Отскок от границ
                if (targetX <= 0 || targetX >= field.clientWidth - 80) velX *= -1;
                if (targetY <= 0 || targetY >= field.clientHeight - 80) velY *= -1;
                
                target.style.transform = `translate(${targetX}px, ${targetY}px)`;
                target.classList.remove('locked');
                lockProgress = 0;
                timerRing.style.strokeDashoffset = 282.7;
                levelVal.textContent = "SEARCHING";
                levelVal.style.color = "#00d2ff";
            } else {
                // Цель замерла (Захват)
                target.classList.add('locked');
                lockProgress += dt;
                levelVal.textContent = "LOCKING...";
                levelVal.style.color = "#ff0055";
                
                const offset = 282.7 - (Math.min(lockProgress / lockTimeRequired, 1) * 282.7);
                timerRing.style.strokeDashoffset = offset;

                if (lockProgress >= lockTimeRequired) {
                    captureTarget();
                }
            }
            
            requestAnimationFrame(moveTarget);
        }

        function captureTarget() {
            score += 100;
            scoreVal.textContent = score.toString().padStart(4, '0');
            
            // Телепортация в новую точку
            targetX = Math.random() * (field.clientWidth - 80);
            targetY = Math.random() * (field.clientHeight - 80);
            velX = (Math.random() - 0.5) * 4;
            velY = (Math.random() - 0.5) * 4;
            
            lockProgress = 0;
            stability = 0; // Сброс стабильности для нового цикла
            
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            updateHUD();
        }

        async function init() {
            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') start();
                    else alert("Нужен доступ к датчикам для работы тренажера.");
                } else {
                    start();
                }
            } catch (e) {
                start(); // Fallback для браузеров без requestPermission
            }
        }

        function start() {
            isRunning = true;
            initBtn.classList.add('hidden');
            lastUpdateTime = Date.now();
            
            // Обработчик датчиков
            window.addEventListener('deviceorientation', (e) => {
                // Если данные приходят (мобильный)
                if (e.beta !== null) {
                    let totalRot = Math.abs(e.beta || 0) + Math.abs(e.gamma || 0);
                    let delta = Math.abs(totalRot - lastRot);
                    lastRot = totalRot;

                    // Расчет стабильности: 0 движение = 100% стабильность
                    let currentStab = Math.max(0, 100 - (delta * 12));
                    stability = (stability * 0.6) + (currentStab * 0.4);
                }
            });

            // Эмуляция для десктопа (если датчиков нет, используем рандом)
            if (!window.DeviceOrientationEvent) {
                setInterval(() => {
                    if (Math.random() > 0.9) stability = 40; // Эмуляция рывка
                    else stability = 98; // Эмуляция покоя
                }, 1000);
            }

            // Визуальное обновление полоски
            setInterval(() => {
                stabilityFill.style.width = `${stability}%`;
                updateHUD();
            }, 100);

            moveTarget();
        }

        initBtn.addEventListener('click', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge: Neural Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #020202;
            color: #00d2ff;
            overflow: hidden;
            touch-action: none;
        }

        #target {
            width: 80px;
            height: 80px;
            position: absolute;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s linear, opacity 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            z-index: 5;
        }

        .target-cross {
            width: 40px;
            height: 2px;
            background: #00d2ff;
            position: absolute;
        }
        .target-cross.vert { transform: rotate(90deg); }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            pointer-events: none;
        }

        .locked {
            border-color: #ff0055 !important;
            box-shadow: 0 0 40px #ff0055 !important;
            transform: scale(1.2);
        }

        .progress-ring {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        #data-stream {
            font-family: monospace;
            font-size: 10px;
            color: rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- HUD Header -->
    <div class="flex justify-between items-start mb-4">
        <div>
            <div class="text-[0.6rem] opacity-50 uppercase tracking-[0.2em]">Pilot Status</div>
            <div id="pilot-name" class="font-black text-xl">DANI_01</div>
        </div>
        <div class="text-right">
            <div class="text-[0.6rem] opacity-50 uppercase tracking-[0.2em]">Level</div>
            <div id="level-val" class="font-black text-xl">STABILITY_01</div>
        </div>
    </div>

    <!-- Data Stream Side -->
    <div id="data-stream" class="absolute left-4 top-24 w-32 h-64 overflow-hidden pointer-events-none">
        <!-- Will be filled by JS -->
    </div>

    <!-- Main Training Field -->
    <div id="field" class="flex-grow relative border border-white/5 rounded-2xl overflow-hidden bg-white/[0.02]">
        <div id="target">
            <div class="target-cross"></div>
            <div class="target-cross vert"></div>
            <svg class="absolute" width="100" height="100">
                <circle id="timer-ring" class="progress-ring" stroke="#ff0055" stroke-width="4" fill="transparent" r="45" cx="50" cy="50" stroke-dasharray="282.7" stroke-dashoffset="282.7"/>
            </svg>
        </div>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-full h-[1px] bg-white/5"></div>
            <div class="h-full w-[1px] bg-white/5"></div>
        </div>
    </div>

    <!-- HUD Footer -->
    <div class="mt-6 flex flex-col gap-4">
        <div class="flex justify-between items-end">
            <div class="flex-grow mr-4">
                <div class="text-[0.5rem] uppercase mb-1 opacity-50">Neural Stability Sensor</div>
                <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden">
                    <div id="stability-fill" class="h-full bg-[#00d2ff] w-0 transition-all"></div>
                </div>
            </div>
            <div id="score" class="text-3xl font-black italic">0000</div>
        </div>
        
        <button id="initBtn" class="w-full py-4 bg-white text-black font-black text-sm uppercase tracking-[0.4em] rounded-lg">
            Initialize Core
        </button>
    </div>

    <script>
        const target = document.getElementById('target');
        const field = document.getElementById('field');
        const initBtn = document.getElementById('initBtn');
        const stabilityFill = document.getElementById('stability-fill');
        const scoreVal = document.getElementById('score');
        const timerRing = document.getElementById('timer-ring');
        const dataStream = document.getElementById('data-stream');

        let score = 0;
        let isRunning = false;
        let stability = 0;
        let lockProgress = 0;
        const lockThreshold = 92; // Порог стабильности для начала захвата
        const lockTimeRequired = 1000; // мс в покое
        let lastUpdateTime = Date.now();

        let targetX = 0;
        let targetY = 0;
        let velX = 2;
        let velY = 2;

        function updateHUD() {
            const line = document.createElement('div');
            line.textContent = `V_STAB: ${stability.toFixed(2)}% | T_SYNC: ${Date.now()}`;
            dataStream.prepend(line);
            if (dataStream.children.length > 20) dataStream.removeChild(dataStream.lastChild);
        }

        function moveTarget() {
            if (!isRunning) return;

            // Если стабильность низкая, цель "убегает" (Smooth Pursuit)
            if (stability < lockThreshold) {
                targetX += velX;
                targetY += velY;
                
                if (targetX <= 0 || targetX >= field.clientWidth - 80) velX *= -1;
                if (targetY <= 0 || targetY >= field.clientHeight - 80) velY *= -1;
                
                target.style.transform = `translate(${targetX}px, ${targetY}px)`;
                target.classList.remove('locked');
                lockProgress = 0;
            } else {
                // Если Даня замер, начинается захват
                target.classList.add('locked');
                lockProgress += (Date.now() - lastUpdateTime);
                
                // Прогресс кольца (282.7 - длина окружности)
                const offset = 282.7 - (lockProgress / lockTimeRequired) * 282.7;
                timerRing.style.strokeDashoffset = Math.max(0, offset);

                if (lockProgress >= lockTimeRequired) {
                    captureTarget();
                }
            }
            
            lastUpdateTime = Date.now();
            requestAnimationFrame(moveTarget);
        }

        function captureTarget() {
            score += 100;
            scoreVal.textContent = score.toString().padStart(4, '0');
            
            // Смена позиции после успеха
            targetX = Math.random() * (field.clientWidth - 80);
            targetY = Math.random() * (field.clientHeight - 80);
            velX = (Math.random() - 0.5) * 6;
            velY = (Math.random() - 0.5) * 6;
            
            lockProgress = 0;
            updateHUD();
            
            // Тактильный эффект (если поддерживается)
            if (navigator.vibrate) navigator.vibrate(50);
        }

        async function init() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') start();
            } else {
                start();
            }
        }

        function start() {
            isRunning = true;
            initBtn.style.display = 'none';
            
            window.addEventListener('deviceorientation', (e) => {
                let totalRot = Math.abs(e.beta) + Math.abs(e.gamma);
                static lastRot = 0;
                let delta = Math.abs(totalRot - lastRot);
                lastRot = totalRot;

                // Инвертируем: мало движения = высокая стабильность
                let currentStab = Math.max(0, 100 - (delta * 20));
                stability = (stability * 0.7) + (currentStab * 0.3);
                stabilityFill.style.width = `${stability}%`;
            });

            moveTarget();
            setInterval(updateHUD, 500);
        }

        initBtn.addEventListener('click', init);
    </script>
</body>
</html>

<!-- 
  PROJECT: GazeBridge // Final Tactical Signal
  ARCHITECT: Svetlana Vorobeva
  PURPOSE: OMA Neural Orthotic (Phase 1)
  LOGIC: Stein's 800ms Stillness Window // Inhibition as Input
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge // Tactical HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@800&family=JetBrains+Mono:wght@500;800&display=swap');

        :root {
            --m-cell-green: #00ff41;
            --nitro-blue: #00d2ff;
            --thrust-red: #ff3131;
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Lexend', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
        }

        #dashboard-container {
            position: relative;
            width: 75vmin;
            height: 75vmin;
            max-width: 340px;
            max-height: 340px;
            border-radius: 50%;
            border: 2px solid rgba(0, 210, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #progress-ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 10px solid rgba(255, 255, 255, 0.02);
            border-top-color: var(--nitro-blue);
            transform: rotate(-90deg);
            opacity: 0;
            transition: opacity 0.2s;
        }

        #target-word {
            font-size: 8vmin;
            font-weight: 900;
            filter: blur(15px);
            transition: filter 0.2s, transform 0.2s, color 0.3s;
            text-align: center;
            z-index: 10;
            letter-spacing: 0.1em;
        }

        /* HUD STATES */
        .state-thrusting #dashboard-container { border-color: var(--thrust-red); box-shadow: 0 0 40px rgba(255, 49, 49, 0.3); }
        .state-stabilizing #dashboard-container { border-color: var(--nitro-blue); }
        .state-stabilizing #progress-ring { opacity: 1; }
        .state-locked #dashboard-container { border-color: var(--m-cell-green); box-shadow: 0 0 60px rgba(0, 255, 65, 0.4); }
        .state-locked #target-word { filter: blur(0px); transform: scale(1.1); color: var(--m-cell-green); }

        .telemetry-bar {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--nitro-blue);
            opacity: 0.6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="p-6">

    <!-- STARTUP SCREEN: Required for Mobile Sensor Access -->
    <div id="overlay" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
        <div class="border-l-4 border-cyan-400 pl-4 mb-10 text-left">
            <h1 class="text-3xl font-black tracking-tighter">GAZEBRIDGE</h1>
            <p class="text-[10px] text-cyan-400 uppercase tracking-[0.3em]">Neural Command HUD</p>
        </div>
        <button onclick="requestAccess()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-12 py-5 rounded-full font-bold text-sm shadow-2xl active:scale-95 transition-all">
            ACTIVATE SYSTEM
        </button>
        <p id="error-msg" class="mt-8 text-xs text-red-500 font-mono hidden"></p>
    </div>

    <!-- MAIN HUD -->
    <header class="flex justify-between items-start z-50">
        <div class="border-l-2 border-cyan-400 pl-2">
            <h2 class="text-[10px] font-black tracking-widest text-white">COMMANDER_ZERO</h2>
            <p id="status-msg" class="text-[8px] text-cyan-400/60 uppercase">Link: Standby</p>
        </div>
        <div id="live-signal" class="telemetry-bar uppercase">Signal: 0.00</div>
    </header>

    <main class="flex-grow flex items-center justify-center">
        <div id="dashboard-container">
            <div id="progress-ring"></div>
            <p id="hud-label" class="text-[9px] font-mono text-cyan-400 uppercase tracking-[0.3em] mb-3">Initiate</p>
            <div id="target-word">LOCKED</div>
        </div>
    </main>

    <footer class="flex justify-between items-end z-50">
        <div class="max-w-[140px]">
            <p class="text-[8px] opacity-30 uppercase tracking-widest mb-1">Stein Logic Gate</p>
            <p class="text-[7px] font-mono text-cyan-500/50 uppercase">Window: 800ms</p>
        </div>
        <div id="counter" class="text-4xl font-black text-cyan-400 tracking-tighter">0/5</div>
    </footer>

    <script>
        const CONFIG = {
            WINDOW_MS: 800,        // Time required for M-cell fixation
            THRUST_THRESHOLD: 1.8,  // Delta required to trigger Thrust mode
            STILL_THRESHOLD: 0.12   // Maximum movement allowed during lock
        };

        const MISSION_WORDS = ["SIGNAL", "VECTOR", "STABLE", "ANCHOR", "AGENCY"];
        let currentIdx = 0;
        let state = "IDLE";
        let lastX = 0, lastY = 0;
        let stillnessStart = null;

        async function requestAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') startSystem();
                    else alert("Permission Denied. Please check browser settings.");
                } catch (e) { alert("Secure context required (HTTPS)."); }
            } else {
                startSystem();
            }
        }

        function startSystem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status-msg').innerText = "Link: Established";
            document.getElementById('target-word').innerText = "HOLD";
            window.addEventListener('deviceorientation', handleMotion, true);
            speak("System online. Execute thrust.");
        }

        function handleMotion(e) {
            if (state === "LOCKED") return;

            // Calculate movement magnitude from gyroscope deltas
            let delta = Math.abs(e.beta - lastX) + Math.abs(e.gamma - lastY);
            document.getElementById('live-signal').innerText = "Signal: " + delta.toFixed(2);
            
            const now = performance.now();
            const body = document.body;
            const ring = document.getElementById('progress-ring');
            const label = document.getElementById('hud-label');

            // 1. DETECT HEAD THRUST
            if (delta > CONFIG.THRUST_THRESHOLD) {
                state = "THRUSTING";
                stillnessStart = null;
                body.className = "p-6 state-thrusting";
                label.innerText = "THRUST";
                ring.style.opacity = "0.1";
            } 
            // 2. DETECT STABILIZATION START
            else if (state === "THRUSTING" && delta < CONFIG.STILL_THRESHOLD) {
                state = "STABILIZING";
                stillnessStart = now;
                body.className = "p-6 state-stabilizing";
                label.innerText = "LOCKING";
            }
            // 3. MONITOR 800ms WINDOW
            else if (state === "STABILIZING") {
                if (delta < CONFIG.STILL_THRESHOLD) {
                    let elapsed = now - stillnessStart;
                    let progress = Math.min(100, (elapsed / CONFIG.WINDOW_MS) * 100);
                    ring.style.opacity = "1";
                    ring.style.borderTopColor = `rgba(0, 210, 255, ${progress/100})`;

                    if (elapsed >= CONFIG.WINDOW_MS) {
                        triggerUnlock();
                    }
                } else {
                    // RESET if stillness is broken before 800ms
                    state = "THRUSTING";
                    stillnessStart = null;
                    label.innerText = "RESET";
                    if (window.navigator.vibrate) window.navigator.vibrate(30);
                }
            }

            lastX = e.beta; lastY = e.gamma;
        }

        function triggerUnlock() {
            state = "LOCKED";
            const word = MISSION_WORDS[currentIdx];
            document.body.className = "p-6 state-locked";
            document.getElementById('hud-label').innerText = "ACQUIRED";
            document.getElementById('target-word').innerText = word;
            
            speak(word);

            setTimeout(() => {
                if (currentIdx < MISSION_WORDS.length - 1) {
                    currentIdx++;
                    resetToReady();
                } else {
                    document.getElementById('target-word').innerText = "SUCCESS";
                    document.getElementById('hud-label').innerText = "MISSION_COMPLETE";
                    speak("Mission complete. Excellent work, Commander.");
                }
            }, 3000);
        }

        function resetToReady() {
            state = "READY";
            document.body.className = "p-6";
            document.getElementById('target-word').innerText = "HOLD";
            document.getElementById('target-word').style.filter = "blur(15px)";
            document.getElementById('hud-label').innerText = "WAITING";
            document.getElementById('counter').innerText = `${currentIdx}/5`;
            document.getElementById('progress-ring').style.opacity = "0";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 1.0; u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GazeBridge: Ticker Mode v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
        }

        .ticker-container {
            height: 300px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid rgba(0, 210, 255, 0.2);
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
            background: linear-gradient(180deg, rgba(0, 210, 255, 0.05) 0%, rgba(0, 0, 0, 0) 100%);
            position: relative;
        }

        #ticker {
            white-space: nowrap;
            font-size: 6rem;
            font-weight: 900;
            padding-left: 100vw;
            will-change: transform;
            color: #00d2ff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            transition: filter 0.3s ease;
        }

        .focus-gate {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #ff0055;
            box-shadow: 0 0 20px #ff0055;
            z-index: 10;
            opacity: 0.7;
        }

        #debug-panel {
            font-family: monospace;
            font-size: 10px;
            color: rgba(0, 210, 255, 0.6);
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- Header -->
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-[#00d2ff]">GAZEBRIDGE</h1>
            <p class="text-[0.6rem] text-cyan-700 uppercase tracking-[0.3em] font-bold">Protocol: Smooth Pursuit</p>
        </div>
        <div id="status" class="px-4 py-2 rounded-full border border-gray-800 text-[10px] font-black uppercase tracking-widest text-gray-500">
            OFFLINE
        </div>
    </div>

    <!-- Debug Info -->
    <div id="debug-panel" class="mb-6">
        > LINK: <span id="sensor-state" class="text-white">WAITING...</span><br>
        > FOCUS: <span id="stab-val" class="text-white">0</span>%
    </div>

    <!-- Ticker Section -->
    <div class="flex-grow flex items-center justify-center relative w-full">
        <div class="w-full ticker-container">
            <div class="focus-gate"></div>
            <div id="ticker">
                ДАНИЯ ПЕЧАТАЕТ СВОЙ ПЕРВЫЙ АВТОМОБИЛЬ... МАЙ — МЕСЯЦ ОСВЕДОМЛЕННОСТИ ОБ АПРАКСИИ... МЫ СТРОИМ МОСТ... ТЫ — КОМАНДИР СВОЕГО ВЗГЛЯДА...
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-8 flex flex-col items-center gap-6">
        <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden">
            <div id="stability-bar" class="h-full bg-[#00d2ff] w-0 transition-all duration-300"></div>
        </div>
        
        <button id="startBtn" class="w-full py-5 bg-white text-black font-black text-sm uppercase tracking-[0.3em] rounded-2xl btn-glow active:scale-95 transition-transform">
            Initialize Neural Link
        </button>

        <!-- Emergency Demo Button -->
        <button id="simBtn" class="px-6 py-2 border border-pink-500/30 text-pink-500 text-[10px] uppercase font-bold tracking-widest rounded-full hover:bg-pink-500/10 transition-all">
            Force Demo Mode
        </button>
    </div>

    <script>
        const ticker = document.getElementById('ticker');
        const stabilityBar = document.getElementById('stability-bar');
        const statusBadge = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const simBtn = document.getElementById('simBtn');
        const sensorStateDisplay = document.getElementById('sensor-state');
        const stabValDisplay = document.getElementById('stab-val');

        let isRunning = false;
        let isSimulating = false;
        let position = 0;
        let speed = 0;
        const baseSpeed = 4;
        let stability = 0;
        let lastRotation = 0;

        function update() {
            if (isRunning) {
                if (stability > 80) {
                    // Текст плывет
                    position -= baseSpeed;
                    speed = baseSpeed;
                    statusBadge.innerText = "SIGNAL CLEAR";
                    statusBadge.style.borderColor = "#00ff41";
                    statusBadge.style.color = "#00ff41";
                    ticker.style.filter = "blur(0px)";
                } else {
                    // Текст замедляется и размывается
                    speed *= 0.9;
                    position -= speed;
                    statusBadge.innerText = "NOISE DETECTED";
                    statusBadge.style.borderColor = "#ff3131";
                    statusBadge.style.color = "#ff3131";
                    ticker.style.filter = `blur(${Math.max(2, (90 - stability) / 4)}px)`;
                }

                // Бесконечный цикл
                if (Math.abs(position) > (ticker.offsetWidth)) {
                    position = window.innerWidth;
                }

                ticker.style.transform = `translateX(${position}px)`;
            }
            requestAnimationFrame(update);
        }

        async function init() {
            startBtn.classList.add('hidden');
            
            // Проверка доступа (для iOS Safari)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startSensors();
                    } else {
                        enableSimulation("PERMISSION DENIED");
                    }
                } catch (err) {
                    enableSimulation("BROWSER BLOCK");
                }
            } else {
                // Прямой старт (Android / Chrome)
                startSensors();
            }

            // Авто-переход в демо, если через 1.5 сек данных нет
            setTimeout(() => {
                if (stability === 0 && !isSimulating) {
                    enableSimulation("NO SENSOR DETECTED");
                }
            }, 1500);
        }

        function startSensors() {
            isRunning = true;
            sensorStateDisplay.textContent = "CONNECTED (GYRO)";
            sensorStateDisplay.classList.add('text-green-400');
            
            window.addEventListener('deviceorientation', (event) => {
                if (isSimulating) return;
                
                // Суммарное вращение (бета и гамма)
                let total = Math.abs(event.beta || 0) + Math.abs(event.gamma || 0);
                let delta = Math.abs(total - lastRotation);
                lastRotation = total;

                // Расчет стабильности: тишина = 100%
                let currentStab = Math.max(0, 100 - (delta * 35));
                stability = (stability * 0.6) + (currentStab * 0.4);
                
                stabilityBar.style.width = `${stability}%`;
                stabValDisplay.textContent = Math.floor(stability);
            });
            update();
        }

        function enableSimulation(reason) {
            if (isSimulating) return;
            isSimulating = true;
            isRunning = true;
            sensorStateDisplay.textContent = reason + " -> SIMULATING";
            sensorStateDisplay.classList.add('text-pink-400');
            
            // Цикл имитации: 3 сек покой, 1.5 сек "рывок"
            setInterval(() => {
                let isStable = Math.random() > 0.3;
                stability = isStable ? 98 : 15;
                stabilityBar.style.width = `${stability}%`;
                stabValDisplay.textContent = Math.floor(stability);
            }, 2500);
            
            update();
        }

        simBtn.addEventListener('click', () => enableSimulation("MANUAL OVERRIDE"));
        startBtn.addEventListener('click', init);

        // Начальная установка позиции
        position = window.innerWidth;
    </script>
</body>
</html>
